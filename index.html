<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>私の謎解き管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Meiryo', 'メイリオ', sans-serif;
      background: #fff0f8;
      color: #4a3060;
      min-height: 100vh;
    }

    /* ヘッダー */
    header {
      background: linear-gradient(135deg, #ff8ec8, #a8e063);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 16px rgba(199,125,255,0.35);
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '✨ 🔍 ✨ 🔑 ✨ 🔍 ✨ 🔑 ✨';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      font-size: 0.65rem;
      text-align: center;
      opacity: 0.35;
      letter-spacing: 6px;
    }
    header h1 { font-size: 1.4rem; font-weight: 800; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    header .logo { font-size: 2rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }

    /* タブ */
    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 3px solid #ffd6ef;
      box-shadow: 0 2px 8px rgba(255,142,200,0.1);
    }
    .tab {
      flex: 1;
      padding: 13px 8px;
      text-align: center;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 700;
      color: #c0a0c8;
      border-bottom: 3px solid transparent;
      margin-bottom: -3px;
      transition: all 0.2s;
    }
    .tab.active {
      color: #d060c0;
      border-bottom-color: #ff8ec8;
      background: #fff8fc;
    }
    .tab:hover:not(.active) { background: #fff4fa; color: #d080c0; }

    .page { display: none; padding: 18px; max-width: 680px; margin: 0 auto; }
    .page.active { display: block; }

    /* 統計カード */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 22px;
    }
    .stat-card {
      background: #fff;
      border-radius: 20px;
      padding: 16px 10px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(199,125,255,0.15);
      border: 2px solid #ffd6ef;
      transition: transform 0.15s;
    }
    .stat-card:hover { transform: translateY(-3px); }
    .stat-card .num {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff8ec8, #c77dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-card .label { font-size: 0.72rem; color: #b090c0; margin-top: 3px; font-weight: 700; }

    /* 記録カード */
    .record-card {
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
      box-shadow: 0 4px 14px rgba(199,125,255,0.12);
      border: 2px solid #ffd6ef;
      transition: transform 0.15s;
    }
    .record-card:hover { transform: translateY(-2px); }
    .record-card .title { font-size: 1rem; font-weight: 800; margin-bottom: 7px; color: #5a3070; }
    .record-card .meta { font-size: 0.8rem; color: #b090c0; display: flex; flex-wrap: wrap; gap: 10px; }
    .record-card .meta span { display: flex; align-items: center; gap: 4px; }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 800;
      margin-left: 8px;
    }
    .badge.cleared { background: #e0faf0; color: #2dba7a; border: 1.5px solid #a0e8c8; }
    .badge.failed { background: #ffe0ef; color: #e05080; border: 1.5px solid #ffb0c8; }
    .delete-btn {
      position: absolute;
      top: 12px; right: 12px;
      background: #fff0f8;
      border: 1.5px solid #ffd6ef;
      color: #e090c0;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 3px 7px;
      border-radius: 8px;
      transition: all 0.15s;
    }
    .delete-btn:hover { background: #ffe0ef; color: #e05080; border-color: #ffb0c8; }

    /* フォーム */
    .form-card {
      background: #fff;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 4px 16px rgba(199,125,255,0.15);
      border: 2px solid #ffd6ef;
    }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 0.8rem; font-weight: 700; color: #c077d0; margin-bottom: 5px; }
    input, select, textarea {
      width: 100%;
      background: #fff8fc;
      border: 2px solid #ffd6ef;
      border-radius: 12px;
      padding: 9px 14px;
      color: #5a3070;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #ff8ec8;
      box-shadow: 0 0 0 3px rgba(255,142,200,0.18);
    }
    input::placeholder, textarea::placeholder { color: #d8b8e0; }
    select option { background: #fff8fc; }
    textarea { resize: vertical; min-height: 70px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn {
      background: linear-gradient(135deg, #ff8ec8, #c77dff);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      width: 100%;
      margin-top: 6px;
      box-shadow: 0 4px 14px rgba(199,125,255,0.35);
      transition: all 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(199,125,255,0.45); }
    .btn:active { transform: translateY(0); }

    /* 検索 */
    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .search-bar input { flex: 1; }
    .search-bar button {
      background: linear-gradient(135deg, #ff8ec8, #c77dff);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 9px 18px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 800;
      font-family: inherit;
      white-space: nowrap;
      box-shadow: 0 3px 10px rgba(199,125,255,0.3);
      transition: all 0.2s;
    }
    .search-bar button:hover { transform: translateY(-2px); box-shadow: 0 5px 14px rgba(199,125,255,0.4); }
    .event-card {
      background: #fff;
      border-radius: 18px;
      padding: 15px;
      margin-bottom: 11px;
      box-shadow: 0 4px 14px rgba(199,125,255,0.12);
      border: 2px solid #ffd6ef;
      transition: transform 0.15s;
    }
    .event-card:hover { transform: translateY(-2px); }
    .event-card .etitle { font-size: 0.95rem; font-weight: 800; margin-bottom: 7px; color: #5a3070; }
    .event-card .emeta { font-size: 0.78rem; color: #b090c0; display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; font-weight: 700; }
    .event-card a {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 800;
      color: #fff;
      text-decoration: none;
      background: linear-gradient(135deg, #ff8ec8, #c77dff);
      border-radius: 8px;
      padding: 4px 14px;
      box-shadow: 0 2px 8px rgba(199,125,255,0.3);
      transition: all 0.2s;
    }
    .event-card a:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(199,125,255,0.4); }

    .loading { text-align: center; color: #c0a0c8; padding: 30px; font-weight: 700; }
    .no-data { text-align: center; color: #d0b0d8; padding: 40px; font-size: 0.9rem; font-weight: 700; }

    .section-title {
      font-size: 0.85rem;
      font-weight: 800;
      color: #d080c0;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-title::before { content: '✦'; }

    .difficulty-bar {
      height: 6px;
      background: #ffeaf6;
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }
    .difficulty-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, #ff8ec8, #c77dff);
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    /* デコ */
    .deco-dots {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      justify-content: center;
      opacity: 0.4;
    }
    .deco-dots span { width: 6px; height: 6px; border-radius: 50%; background: #ff8ec8; }
    .deco-dots span:nth-child(2) { background: #c77dff; }
    .deco-dots span:nth-child(3) { background: #7b9fff; }
  </style>
</head>
<body>

<header>
  <span class="logo">🔍</span>
  <h1>謎解き・脱出ゲーム🪿 </h1>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('home')">🏠 ホーム</div>
  <div class="tab" onclick="switchTab('add')">✏️ 記録する</div>
  <div class="tab" onclick="switchTab('search')">🔎 検索</div>
</div>

<!-- ホーム -->
<div class="page active" id="page-home">
  <div class="deco-dots"><span></span><span></span><span></span><span></span><span></span></div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="num" id="stat-total">0</div>
      <div class="label">🎮 参加数</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-cleared">0</div>
      <div class="label">🌟 クリア数</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-rate">0%</div>
      <div class="label">💪 クリア率</div>
    </div>
  </div>

  <div class="section-title">最近の記録</div>
  <div id="recent-list"></div>
</div>

<!-- 記録追加 -->
<div class="page" id="page-add">
  <div class="form-card">
    <div class="form-group">
      <label>🎭 イベント名 *</label>
      <input type="text" id="f-name" placeholder="例: 謎解きの館 〜失われた鍵〜">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>📅 開催日 *</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-group">
        <label>📍 場所</label>
        <input type="text" id="f-place" placeholder="例: 東京・新宿">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>⭐ 難易度 (1〜5)</label>
        <select id="f-difficulty">
          <option value="1">★☆☆☆☆ やさしい</option>
          <option value="2">★★☆☆☆ 初級</option>
          <option value="3" selected>★★★☆☆ 中級</option>
          <option value="4">★★★★☆ 上級</option>
          <option value="5">★★★★★ 激難</option>
        </select>
      </div>
      <div class="form-group">
        <label>🏆 結果</label>
        <select id="f-result">
          <option value="cleared">クリア ✅</option>
          <option value="failed">未クリア ❌</option>
          <option value="unknown">不明</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>⏱ クリアタイム（分）</label>
      <input type="number" id="f-time" placeholder="例: 55" min="0">
    </div>
    <div class="form-group">
      <label>💬 感想・メモ</label>
      <textarea id="f-note" placeholder="難しかった謎、印象に残ったことなど..."></textarea>
    </div>
    <button class="btn" onclick="saveRecord()">✨ 記録を保存する</button>
  </div>
</div>

<!-- イベント検索 -->
<div class="page" id="page-search">
  <div class="search-bar">
    <input type="text" id="search-kw" placeholder="キーワード（例: 謎解き 東京）" value="謎解き">
    <button onclick="searchEvents()">🔍 検索</button>
  </div>
  <div id="search-results"><div class="no-data">キーワードを入力して検索してください 🔑</div></div>
</div>

<script>
  function getRecords() {
    return JSON.parse(localStorage.getItem('nazotoki_records') || '[]');
  }
  function saveRecords(list) {
    localStorage.setItem('nazotoki_records', JSON.stringify(list));
  }

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['home','add','search'][i] === name);
    });
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    if (name === 'home') renderHome();
  }

  function renderHome() {
    const records = getRecords();
    const cleared = records.filter(r => r.result === 'cleared').length;
    document.getElementById('stat-total').textContent = records.length;
    document.getElementById('stat-cleared').textContent = cleared;
    document.getElementById('stat-rate').textContent =
      records.length ? Math.round(cleared / records.length * 100) + '%' : '0%';

    const list = document.getElementById('recent-list');
    if (!records.length) {
      list.innerHTML = '<div class="no-data">まだ記録がありません🌸<br>「記録する」タブから追加してみましょう！</div>';
      return;
    }
    const sorted = [...records].reverse().slice(0, 20);
    list.innerHTML = sorted.map(r => `
      <div class="record-card">
        <div class="title">
          ${escHtml(r.name)}
          ${r.result === 'cleared' ? '<span class="badge cleared">✅ クリア</span>' : r.result === 'failed' ? '<span class="badge failed">❌ 未クリア</span>' : ''}
        </div>
        <div class="meta">
          <span>📅 ${r.date}</span>
          ${r.place ? `<span>📍 ${escHtml(r.place)}</span>` : ''}
          ${r.time ? `<span>⏱ ${r.time}分</span>` : ''}
        </div>
        <div class="difficulty-bar"><div class="fill" style="width:${r.difficulty*20}%"></div></div>
        ${r.note ? `<div style="margin-top:9px;font-size:0.82rem;color:#a080b0;">${escHtml(r.note)}</div>` : ''}
        <button class="delete-btn" onclick="deleteRecord('${r.id}')" title="削除">✕</button>
      </div>
    `).join('');
  }

  function saveRecord() {
    const name = document.getElementById('f-name').value.trim();
    const date = document.getElementById('f-date').value;
    if (!name || !date) { alert('イベント名と開催日は必須です'); return; }
    const record = {
      id: Date.now().toString(),
      name,
      date,
      place: document.getElementById('f-place').value.trim(),
      difficulty: parseInt(document.getElementById('f-difficulty').value),
      result: document.getElementById('f-result').value,
      time: document.getElementById('f-time').value || '',
      note: document.getElementById('f-note').value.trim(),
    };
    const records = getRecords();
    records.push(record);
    saveRecords(records);
    ['f-name','f-place','f-time','f-note'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-difficulty').value = '3';
    document.getElementById('f-result').value = 'cleared';
    alert('記録を保存しました！🎉');
    switchTab('home');
  }

  function deleteRecord(id) {
    if (!confirm('この記録を削除しますか？')) return;
    saveRecords(getRecords().filter(r => r.id !== id));
    renderHome();
  }

  async function searchEvents() {
    const kw = document.getElementById('search-kw').value.trim() || '謎解き';
    const container = document.getElementById('search-results');
    container.innerHTML = '<div class="loading">🔍 検索中...</div>';
    try {
      const url = `https://connpass.com/api/v2/events/?keyword=${encodeURIComponent(kw)}&count=20&order=2`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('API error');
      const data = await res.json();
      const events = data.events || [];
      if (!events.length) {
        container.innerHTML = '<div class="no-data">イベントが見つかりませんでした 🔑</div>';
        return;
      }
      container.innerHTML = events.map(e => {
        const date = e.started_at ? e.started_at.slice(0, 10) : '日時未定';
        const place = e.address || e.place || 'オンライン';
        const accepted = e.accepted || 0;
        const limit = e.limit || '定員なし';
        return `
          <div class="event-card">
            <div class="etitle">${escHtml(e.title)}</div>
            <div class="emeta">
              <span>📅 ${date}</span>
              <span>📍 ${escHtml(place)}</span>
              <span>👥 ${accepted}/${limit}人</span>
            </div>
            <a href="${e.event_url}" target="_blank" rel="noopener">詳細を見る ✨</a>
          </div>
        `;
      }).join('');
    } catch (e) {
      container.innerHTML = '<div class="no-data">検索中にエラーが発生しました。<br>しばらくしてから再試行してください 🙏</div>';
    }
  }

  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  renderHome();
</script>
</body>
</html>
