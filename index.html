<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>私の謎解き管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Meiryo', 'メイリオ', sans-serif;
      background: #fff0f8;
      color: #4a3060;
      min-height: 100vh;
    }

    /* ヘッダー */
    header {
      background: linear-gradient(135deg, #ff8ec8, #a8e063);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 16px rgba(199,125,255,0.35);
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '✨ 🔍 ✨ 🔑 ✨ 🔍 ✨ 🔑 ✨';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      font-size: 0.65rem;
      text-align: center;
      opacity: 0.35;
      letter-spacing: 6px;
    }
    header h1 { font-size: 1.4rem; font-weight: 800; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    header .logo { font-size: 2rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }

    .main { padding: 18px; max-width: 680px; margin: 0 auto; }

    /* 統計カード */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 22px;
    }
    .stat-card {
      background: #fff;
      border-radius: 20px;
      padding: 16px 10px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(199,125,255,0.15);
      border: 2px solid #ffd6ef;
      transition: transform 0.15s;
    }
    .stat-card:hover { transform: translateY(-3px); }
    .stat-card .num {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff8ec8, #c77dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-card .label { font-size: 0.72rem; color: #b090c0; margin-top: 3px; font-weight: 700; }

    /* 記録カード */
    .record-card {
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
      box-shadow: 0 4px 14px rgba(199,125,255,0.12);
      border: 2px solid #ffd6ef;
      transition: transform 0.15s;
    }
    .record-card:hover { transform: translateY(-2px); }
    .record-card .title { font-size: 1rem; font-weight: 800; margin-bottom: 7px; color: #5a3070; }
    .record-card .meta { font-size: 0.8rem; color: #b090c0; display: flex; flex-wrap: wrap; gap: 10px; }
    .record-card .meta span { display: flex; align-items: center; gap: 4px; }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 800;
      margin-left: 8px;
    }
    .badge.cleared { background: #e0faf0; color: #2dba7a; border: 1.5px solid #a0e8c8; }
    .badge.failed { background: #ffe0ef; color: #e05080; border: 1.5px solid #ffb0c8; }
    .delete-btn {
      position: absolute;
      top: 12px; right: 12px;
      background: #fff0f8;
      border: 1.5px solid #ffd6ef;
      color: #e090c0;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 3px 7px;
      border-radius: 8px;
      transition: all 0.15s;
    }
    .delete-btn:hover { background: #ffe0ef; color: #e05080; border-color: #ffb0c8; }

    /* フォーム */
    .form-card {
      background: #fff;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 4px 16px rgba(199,125,255,0.15);
      border: 2px solid #ffd6ef;
      margin-bottom: 22px;
    }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 0.8rem; font-weight: 700; color: #c077d0; margin-bottom: 5px; }
    input, select, textarea {
      width: 100%;
      background: #fff8fc;
      border: 2px solid #ffd6ef;
      border-radius: 12px;
      padding: 9px 14px;
      color: #5a3070;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #ff8ec8;
      box-shadow: 0 0 0 3px rgba(255,142,200,0.18);
    }
    input::placeholder, textarea::placeholder { color: #d8b8e0; }
    select option { background: #fff8fc; }
    textarea { resize: vertical; min-height: 70px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn {
      background: linear-gradient(135deg, #ff8ec8, #c77dff);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      width: 100%;
      margin-top: 6px;
      box-shadow: 0 4px 14px rgba(199,125,255,0.35);
      transition: all 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(199,125,255,0.45); }
    .btn:active { transform: translateY(0); }

    .loading { text-align: center; color: #c0a0c8; padding: 30px; font-weight: 700; }
    .no-data { text-align: center; color: #d0b0d8; padding: 40px; font-size: 0.9rem; font-weight: 700; }

    .section-title {
      font-size: 0.85rem;
      font-weight: 800;
      color: #d080c0;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-title::before { content: '✦'; }

    .difficulty-bar {
      height: 6px;
      background: #ffeaf6;
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }
    .difficulty-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, #ff8ec8, #c77dff);
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    /* サジェスト */
    .input-wrap { position: relative; }
    .suggestions {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: #fff;
      border: 2px solid #ff8ec8;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(199,125,255,0.2);
      z-index: 100;
      max-height: 220px;
      overflow-y: auto;
    }
    .suggestions:empty { display: none; }
    .suggestion-item {
      padding: 9px 14px;
      font-size: 0.88rem;
      color: #5a3070;
      cursor: pointer;
      border-bottom: 1px solid #ffeaf6;
      transition: background 0.1s;
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover, .suggestion-item.active { background: #fff4fa; }
    .suggestion-loading { padding: 10px 14px; font-size: 0.82rem; color: #c0a0c8; }

    /* デコ */
    .deco-dots {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      justify-content: center;
      opacity: 0.4;
    }
    .deco-dots span { width: 6px; height: 6px; border-radius: 50%; background: #ff8ec8; }
    .deco-dots span:nth-child(2) { background: #c77dff; }
    .deco-dots span:nth-child(3) { background: #7b9fff; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
  <span class="logo">🔍</span>
  <h1>謎解き・脱出ゲーム🪿 </h1>
</header>

<div class="main">
  <div class="deco-dots"><span></span><span></span><span></span><span></span><span></span></div>

  <!-- 記録フォーム -->
  <div class="section-title">記録を追加</div>
  <div class="form-card">
    <div class="form-group">
      <label>🏢 団体名</label>
      <select id="f-organizer" onchange="toggleOrgOther()">
        <option value="SCRAP">SCRAP</option>
        <option value="Tumbleweed">Tumbleweed</option>
        <option value="Far&amp;Near">Far&amp;Near</option>
        <option value="XEOXY">XEOXY</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="form-group" id="org-other-group" style="display:none;">
      <label>🏢 団体名（その他）</label>
      <input type="text" id="f-organizer-other" placeholder="団体名を入力">
    </div>
    <div class="form-group">
      <label>🎭 イベント名 *</label>
      <div class="input-wrap">
        <input type="text" id="f-name" placeholder="例: 謎解きの館 〜失われた鍵〜" autocomplete="off">
        <div class="suggestions" id="suggestions"></div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>📅 開催日 *</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-group">
        <label>📍 場所</label>
        <input type="text" id="f-place" placeholder="例: 東京・新宿">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>⭐ 難易度 (1〜5)</label>
        <select id="f-difficulty">
          <option value="1">★☆☆☆☆ やさしい</option>
          <option value="2">★★☆☆☆ 初級</option>
          <option value="3" selected>★★★☆☆ 中級</option>
          <option value="4">★★★★☆ 上級</option>
          <option value="5">★★★★★ 激難</option>
        </select>
      </div>
      <div class="form-group">
        <label>🏆 結果</label>
        <select id="f-result">
          <option value="true">クリア ✅</option>
          <option value="false">未クリア ❌</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>💬 感想・メモ</label>
      <textarea id="f-note" placeholder="難しかった謎、印象に残ったことなど..."></textarea>
    </div>
    <button class="btn" id="save-btn" onclick="saveRecord()">✨ 記録を保存する</button>
  </div>

  <!-- 記録一覧 -->
  <div class="section-title">最近の記録</div>
  <div id="recent-list"></div>

  <!-- 統計 -->
  <div class="stats-grid" style="margin-top:22px;margin-bottom:8px;">
    <div class="stat-card">
      <div class="num" id="stat-total">0</div>
      <div class="label">🎮 参加数</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-cleared">0</div>
      <div class="label">🌟 クリア数</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-rate">0%</div>
      <div class="label">💪 クリア率</div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://anehiiqaeodnexmjzwsd.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFuZWhpaXFhZW9kbmV4bWp6d3NkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzIzMTMsImV4cCI6MjA5MDk0ODMxM30.EWaUuYk56GibRArmF6kdqqH5-wvAerAh0iGEdtk9gbc';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function renderHome() {
    const list = document.getElementById('recent-list');
    list.innerHTML = '<div class="loading">読み込み中...</div>';

    const { data: records, error } = await sb
      .from('records')
      .select('*')
      .order('played_at', { ascending: false })
      .limit(20);

    if (error) {
      list.innerHTML = '<div class="no-data">データの取得に失敗しました 🙏</div>';
      console.error(error);
      return;
    }

    const total = records.length;
    const cleared = records.filter(r => r.cleared).length;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-cleared').textContent = cleared;
    document.getElementById('stat-rate').textContent =
      total ? Math.round(cleared / total * 100) + '%' : '0%';

    if (!records.length) {
      list.innerHTML = '<div class="no-data">まだ記録がありません🌸<br>上のフォームから追加してみましょう！</div>';
      return;
    }

    list.innerHTML = records.map(r => `
      <div class="record-card">
        <div class="title">
          ${escHtml(r.title)}
          ${r.cleared ? '<span class="badge cleared">✅ クリア</span>' : '<span class="badge failed">❌ 未クリア</span>'}
        </div>
        <div class="meta">
          <span>📅 ${r.played_at || ''}</span>
          ${r.location ? `<span>📍 ${escHtml(r.location)}</span>` : ''}
          ${r.difficulty ? `<span>⭐ 難易度 ${r.difficulty}</span>` : ''}
        </div>
        <div class="difficulty-bar"><div class="fill" style="width:${(r.difficulty||0)*20}%"></div></div>
        ${r.impression ? `<div style="margin-top:9px;font-size:0.82rem;color:#a080b0;">${escHtml(r.impression)}</div>` : ''}
        <button class="delete-btn" onclick="deleteRecord('${r.id}')" title="削除">✕</button>
      </div>
    `).join('');
  }

  // --- Tumbleweed イベント取得 ---
  let tumbleweedEvents = null; // null=未取得, []=取得済み

  async function fetchTumbleweedEvents() {
    if (tumbleweedEvents !== null) return tumbleweedEvents;
    const sugBox = document.getElementById('suggestions');
    sugBox.innerHTML = '<div class="suggestion-loading">イベントを取得中...</div>';
    try {
      const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://tumbleweed.jp/event/ongoing/');
      const res = await fetch(proxy);
      const data = await res.json();
      const doc = new DOMParser().parseFromString(data.contents, 'text/html');
      const seen = new Set();
      const titles = [];
      // タイトルになりそな要素を幅広く拾う
      doc.querySelectorAll('h1,h2,h3,h4,.event-title,.title,.name,[class*="title"],[class*="event"]').forEach(el => {
        const t = el.textContent.trim().replace(/\s+/g, ' ');
        if (t.length >= 4 && t.length <= 80 && !seen.has(t)) {
          seen.add(t);
          titles.push(t);
        }
      });
      tumbleweedEvents = titles;
    } catch (e) {
      console.error('Tumbleweed fetch error:', e);
      tumbleweedEvents = [];
    }
    sugBox.innerHTML = '';
    return tumbleweedEvents;
  }

  function toggleOrgOther() {
    const sel = document.getElementById('f-organizer').value;
    document.getElementById('org-other-group').style.display = sel === 'その他' ? 'block' : 'none';
    // Tumbleweed選択時はバックグラウンドで先読み
    if (sel === 'Tumbleweed') fetchTumbleweedEvents();
    hideSuggestions();
    document.getElementById('f-name').value = '';
  }

  // --- サジェスト ---
  function showSuggestions(items) {
    const box = document.getElementById('suggestions');
    if (!items.length) { box.innerHTML = ''; return; }
    box.innerHTML = items.map((t, i) =>
      `<div class="suggestion-item" data-idx="${i}" onmousedown="pickSuggestion(this)">${escHtml(t)}</div>`
    ).join('');
  }

  function hideSuggestions() {
    document.getElementById('suggestions').innerHTML = '';
  }

  function pickSuggestion(el) {
    document.getElementById('f-name').value = el.textContent;
    hideSuggestions();
  }

  // イベント名入力時のリアルタイムフィルタ
  document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('f-name');
    input.addEventListener('input', async () => {
      const q = input.value.trim();
      const org = document.getElementById('f-organizer').value;
      if (!q) { hideSuggestions(); return; }

      let pool = [];
      if (org === 'Tumbleweed') {
        pool = await fetchTumbleweedEvents();
      }
      // Tumbleweed以外 or フォールバック: 何も候補なし
      if (!pool.length) { hideSuggestions(); return; }

      const lower = q.toLowerCase();
      const matched = pool.filter(t => t.toLowerCase().includes(lower)).slice(0, 10);
      showSuggestions(matched);
    });

    input.addEventListener('blur', () => {
      setTimeout(hideSuggestions, 150);
    });
  });

  async function saveRecord() {
    const organizer = document.getElementById('f-organizer').value === 'その他'
      ? document.getElementById('f-organizer-other').value.trim()
      : document.getElementById('f-organizer').value;
    const eventName = document.getElementById('f-name').value.trim();
    const played_at = document.getElementById('f-date').value;
    if (!eventName || !played_at) { alert('イベント名と開催日は必須です'); return; }

    const title = organizer ? `【${organizer}】${eventName}` : eventName;

    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = '保存中...';

    const { error } = await sb.from('records').insert({
      title,
      played_at,
      location: document.getElementById('f-place').value.trim() || null,
      difficulty: parseInt(document.getElementById('f-difficulty').value),
      cleared: document.getElementById('f-result').value === 'true',
      impression: document.getElementById('f-note').value.trim() || null,
    });

    btn.disabled = false;
    btn.textContent = '✨ 記録を保存する';

    if (error) {
      alert('保存に失敗しました: ' + error.message);
      console.error(error);
      return;
    }

    ['f-name','f-place','f-note','f-organizer-other'].forEach(id => document.getElementById(id).value = '');
    hideSuggestions();
    document.getElementById('f-organizer').value = 'SCRAP';
    document.getElementById('org-other-group').style.display = 'none';
    document.getElementById('f-difficulty').value = '3';
    document.getElementById('f-result').value = 'true';
    document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
    renderHome();
  }

  async function deleteRecord(id) {
    if (!confirm('この記録を削除しますか？')) return;
    const { error } = await sb.from('records').delete().eq('id', id);
    if (error) { alert('削除に失敗しました'); return; }
    renderHome();
  }

  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  renderHome();
</script>
</body>
</html>
